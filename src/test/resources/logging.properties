# List of handlers
handlers = java.util.logging.ConsoleHandler

# Configuring Console Output
java.util.logging.ConsoleHandler.level = INFO
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter

# COMPLETE SHUTDOWN OF APACHE LOGS (JUL syntax)
org.apache.hc.level = SEVERE
org.apache.http.level = SEVERE

# Additionally, we jam specific subsystems if they climb over other bridges.
org.apache.hc.client5.http.wire.level = OFF
org.apache.hc.client5.http.headers.level = OFF
org.apache.hc.client5.http.level = SEVERE

# Jamming the WebDriverManager
io.github.bonigarcia.wdm.level = WARNING